version: '3.8'

services:
  # 1. ฐานข้อมูล PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: pos_postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user # ต้องตรงกับ app.module.ts
      POSTGRES_PASSWORD: 123456789 # ต้องตรงกับ app.module.ts
      POSTGRES_DB: postgres # ชื่อ Database
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    networks:
      - share-container-network
    restart: always

  # 2. Redis (เผื่อใช้ Caching หรือ Session ในอนาคต)
  redis:
    image: redis:alpine
    container_name: pos_redis
    ports:
      - "6379:6379"
    networks:
      - share-container-network
    restart: always

  # 3. PgAdmin (หน้าเว็บสำหรับจัดการ Database - Optional)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - share-container-network

  # 4. Backend Service (NestJS)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos_backend
    ports:
      - "3000:3000"
      - "9897:9897"
    environment:
      - DB_HOST=192.168.100.247
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=123456789
      - DB_NAME=postgres
      - PORT=3000
      - JWT_SECRET=super-secret-key-12345
      - JWT_EXPIRATION=24h
    networks:
      - share-container-network
    restart: always

volumes:
  postgres_data_v2:

networks:
  share-container-network:
    external: true
