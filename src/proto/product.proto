syntax = "proto3";

package product;

service ProductService {
  rpc Create (CreateProductRequest) returns (ProductResponse);
  rpc FindOne (ProductByIdRequest) returns (ProductResponse);
  rpc FindAll (Empty) returns (ProductListResponse);
  rpc Update (UpdateProductRequest) returns (Empty);
  rpc Delete (ProductByIdRequest) returns (Empty);
  rpc Restore (ProductByIdRequest) returns (Empty);
}

// Model หลัก (เหมือน ProductModel)
message ProductResponse {
  int32 id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  int32 price = 5;
  int32 cost = 6;
  int32 categoryId = 7;
  int32 lowStockThreshold = 8;
  string createdAt = 9;
  string updatedAt = 10;
  bool isActive = 11;
}

message CreateProductRequest {
  string sku = 1;
  string name = 2;
  string description = 3;
  int32 price = 4;
  int32 cost = 5;
  int32 categoryId = 6;
  int32 lowStockThreshold = 7;
  bool isActive = 8;
}

message UpdateProductRequest {
  int32 id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  int32 price = 5;
  int32 cost = 6;
  int32 categoryId = 7;
  int32 lowStockThreshold = 8;
  bool isActive = 9;
}

message ProductByIdRequest {
  int32 id = 1;
}

message ProductListResponse {
  repeated ProductResponse items = 1;
  int32 total = 2;
}

message Empty {}
