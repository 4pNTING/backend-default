syntax = "proto3";

package auth;

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string _id = 2;
  string username = 3;
  string role = 4;
  string message = 5;
  bool is_active = 6;
  string token = 7;
  string created_at = 8;
  string updated_at = 9;
}
