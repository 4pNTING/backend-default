syntax = "proto3";

package inventory_movement;

message InventoryMovement {
  int32 id = 1;
  int32 productId = 2;
  int32 zoneId = 3;
  string type = 4;
  int32 quantity = 5;
  string note = 6;
  int32 userId = 7;
  string createdAt = 8;
}

message CreateInventoryMovementRequest {
  int32 productId = 1;
  int32 zoneId = 2;
  string type = 3;
  int32 quantity = 4;
  string note = 5;
  int32 userId = 6;
}

message CreateInventoryMovementResponse {
  int32 id = 1;
  int32 productId = 2;
  int32 zoneId = 3;
  string type = 4;
  int32 quantity = 5;
  string note = 6;
  int32 userId = 7;
  string createdAt = 8;
}

message LoadAllInventoryMovementRequest {
}

message LoadAllInventoryMovementResponse {
  repeated InventoryMovement items = 1;
  int32 total = 2;
}

message LoadInventoryMovementByIdRequest {
  int32 id = 1;
}

message LoadInventoryMovementByIdResponse {
  int32 id = 1;
  int32 productId = 2;
  int32 zoneId = 3;
  string type = 4;
  int32 quantity = 5;
  string note = 6;
  int32 userId = 7;
  string createdAt = 8;
}

service InventoryMovementService {
  rpc Create (CreateInventoryMovementRequest) returns (CreateInventoryMovementResponse);
  rpc FindAll (LoadAllInventoryMovementRequest) returns (LoadAllInventoryMovementResponse);
  rpc FindOne (LoadInventoryMovementByIdRequest) returns (LoadInventoryMovementByIdResponse);
}
