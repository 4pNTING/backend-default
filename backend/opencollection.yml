opencollection: 1.0.0

info:
  name: backend
config:
  protobuf:
    protoFiles:
      - type: file
        path: ../src/proto/auth.proto
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
